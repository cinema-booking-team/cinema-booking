<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кинотеатр | Регистрация</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- ШАПКА -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="movies.html">
                <i class="fas fa-film"></i> <span style="color: white;">CINEMA</span><span style="color: #bc13fe;">BOOK</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="movies.html"><i class="fas fa-ticket-alt"></i> Афиша</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html"><i class="fas fa-user"></i> Мои билеты</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html"><i class="fas fa-sign-in-alt"></i> Вход</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html"><i class="fas fa-user-plus"></i> Регистрация</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ФОРМА РЕГИСТРАЦИИ -->
    <div class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-9">
                    <div class="auth-card">
                        <div class="auth-header">
                            <i class="fas fa-user-plus"></i>
                            <h2>Регистрация</h2>
                            <p>Создайте аккаунт чтобы покупать билеты</p>
                        </div>
                        <form id="registerForm">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Имя и фамилия</label>
                                <input type="text" class="form-control" placeholder="Иван Петров" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" class="form-control" placeholder="user@example.com" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Пароль</label>
                                <input type="password" class="form-control" placeholder="••••••" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-check-circle"></i> Подтвердите пароль</label>
                                <input type="password" class="form-control" placeholder="••••••" required>
                            </div>
                            <button type="submit" class="btn-auth">Зарегистрироваться</button>
                        </form>
                        <div class="auth-footer">
                            <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ПОДВАЛ -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h4><i class="fas fa-film"></i> CINEMABOOK</h4>
                    <p>Онлайн-сервис покупки билетов в кинотеатры города</p>
                </div>
                <div class="col-md-4">
                    <h5>Контакты</h5>
                    <p><i class="fas fa-phone"></i> +7 (999) 999-99-91<br>
                    <i class="fas fa-envelope"></i> info@cinemabook.ru</p>
                </div>
                <div class="col-md-4">
                    <h5>Мы в соцсетях</h5>
                    <div class="social-icons">
                        <a href="#"><i class="fab fa-telegram"></i></a>
                        <a href="#"><i class="fab fa-vk"></i></a>
                        <a href="#"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/movies.js"></script>
</body>
</html>
